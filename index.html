<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Dashboard — Web Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  /* Primary — Design Token #007fff (Primary Blue) */
  --accent: #007fff;
  --accent-h: #0063cc;
  --accent-light: #f0f7ff;

  /* Semantic */
  --success: #10b981;
  --success-light: #ecfdf5;
  --positive: #00a63e;
  --danger: #d4183d;
  --danger-light: rgba(212,24,61,0.10);
  --warning: #eab308;
  --warning-light: rgba(234,179,8,0.15);

  /* Surfaces */
  --bg: #fafaf9;
  --white: #ffffff;
  --border: rgba(17,29,74,0.08);
  --border-s: rgba(17,29,74,0.04);

  /* Text */
  --t1: #111d4a;
  --t2: #717182;
  --t3: #99a1af;
  --tlink: #007fff;

  /* Surface helpers */
  --f2: #f8fafe;
  --f3: #f0f1f3;
  --f4: #ffffff;

  /* Shadows — Design Token values */
  --shadow: 0 1px 3px rgba(17,29,74,0.04), 0 1px 2px rgba(17,29,74,0.06);
  --shadow-md: 0 2px 8px rgba(17,29,74,0.06);
  --shadow-lg: 0 8px 24px rgba(17,29,74,0.05);
  --shadow-cta: 0 4px 14px rgba(0,127,255,0.18);
  --shadow-cta-hover: 0 4px 20px rgba(0,127,255,0.28);
  --shadow-nav: 0 10px 15px rgba(0,127,255,0.25);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans','Noto Sans SC',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--t1);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
a{color:inherit;text-decoration:none}
button{font-family:inherit}

/* ── Layout ── */
#app{max-width:960px;margin:0 auto;display:flex;min-height:100vh;background:var(--bg)}
#sidebar{width:180px;min-width:180px;background:var(--white);border-right:1px solid var(--border);height:100vh;position:sticky;top:0;overflow-y:auto;flex-shrink:0;box-shadow:var(--shadow)}
#main{flex:1;min-width:0;padding:24px 28px;overflow-y:auto;min-height:100vh}

/* ── Sidebar ── */
.sb-logo{padding:16px 16px 10px;display:flex;align-items:center;gap:9px;font-weight:700;font-size:15px;color:var(--t1);border-bottom:1px solid var(--border)}
.sb-logo-icon{width:28px;height:28px;border-radius:10px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;box-shadow:var(--shadow-cta)}
.nav-group-label{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.8px;text-transform:uppercase;padding:14px 16px 5px}
.nav-item{padding:7px 12px;margin:2px 8px;cursor:pointer;font-size:13px;color:var(--t2);border-radius:8px;transition:all .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-item:hover{background:var(--f2);color:var(--t1)}
.nav-item.active{background:var(--accent);color:#fff;font-weight:600;box-shadow:var(--shadow-nav)}

/* ── Cards ── */
.card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:18px 20px;box-shadow:var(--shadow)}
.card-c{cursor:pointer;transition:box-shadow .15s,border-color .15s}
.card-c:hover{box-shadow:var(--shadow-md)}
.card-sel{border-color:rgba(0,127,255,0.3)!important;background:var(--accent-light)!important}

/* ── Buttons ── */
.btn-accent{background:var(--accent);color:#fff;border:none;border-radius:9999px;padding:10px 22px;font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background .15s,box-shadow .15s;box-shadow:var(--shadow-cta)}
.btn-accent:hover{background:var(--accent-h);box-shadow:var(--shadow-cta-hover)}
.btn-ghost{background:transparent;color:var(--t1);border:1px solid var(--border);border-radius:9999px;padding:10px 22px;font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background .15s}
.btn-ghost:hover{background:var(--f2)}

/* ── Action row (portfolio operations) ── */
.actions-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.act-btn{display:flex;align-items:center;gap:6px;padding:9px 20px;border-radius:9999px;cursor:pointer;font-size:14px;font-weight:600;border:1px solid var(--border);background:transparent;color:var(--t1);transition:background .15s;white-space:nowrap}
.act-btn:hover{background:var(--f2)}
.act-btn.accent{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:var(--shadow-cta)}
.act-btn.accent:hover{background:var(--accent-h);box-shadow:var(--shadow-cta-hover)}
.act-divider{width:1px;height:22px;background:var(--border);flex-shrink:0}

/* ── Tabs ── */
.tabs-row{display:flex;border-bottom:1px solid var(--border);background:var(--f4)}
.tab-item{padding:10px 22px;cursor:pointer;font-size:13px;font-weight:500;color:var(--t2);border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tab-item.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.tab-content{display:none}
.tab-content.active{display:block}

/* ── Pill / Badge ── */
.pill{display:inline-block;padding:2px 8px;border-radius:9999px;font-size:11px;font-weight:600;line-height:1.4}
.pill-info{background:var(--accent-light);color:var(--accent)}
.pill-success{background:var(--success-light);color:var(--success)}
.pill-warning{background:var(--warning-light);color:var(--warning)}
.pill-neutral{background:var(--f3);color:var(--t2);border:1px solid var(--border)}
.pill-accent{background:var(--accent-light);color:var(--accent)}
.pill-danger{background:var(--danger-light);color:var(--danger)}

/* ── Tables / Rows ── */
.list-row{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.list-row:hover{background:var(--f2)}
.list-row:last-child{border-bottom:none}

/* ── Step bar ── */
.step-bar{display:flex;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:4px}
.step-item{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:6px}
.step-item.active-step{background:var(--accent)}
.step-num{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.step-connector{width:14px;height:1px;background:var(--border);flex-shrink:0}

/* ── Toggle ── */
.toggle{width:40px;height:22px;border-radius:11px;position:relative;cursor:pointer;flex-shrink:0;transition:background .2s}
.toggle-thumb{position:absolute;top:3px;width:16px;height:16px;border-radius:50%;transition:left .15s}

/* ── Network row ── */
.net-row{display:flex;align-items:center;padding:12px 20px;cursor:pointer;transition:background .1s;border-bottom:1px solid var(--border)}
.net-row:hover{background:var(--f2)}

/* ── Staking ── */
.staking-hero{background:var(--accent-light);border:1px solid rgba(0,127,255,0.15);border-radius:12px;padding:20px 24px;box-shadow:var(--shadow)}

/* ── Agent ── */
.agent-card{border:1px solid rgba(0,127,255,0.2);border-radius:12px;overflow:hidden}

/* ── Progress bar ── */
.progress-bar{height:4px;border-radius:2px;background:var(--f3);overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .3s}

/* ── Section label ── */
.sec-label{font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.4px;text-transform:uppercase}

/* ── Chain badge ── */
.chain-badge{font-size:11px;padding:1px 7px;border-radius:4px;font-weight:600}

/* ── Feature panel ── */
#feature-panel{position:fixed;bottom:24px;right:24px;width:280px;background:var(--white);border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:0 24px 60px rgba(17,29,74,0.12);display:none;z-index:100;max-height:400px;overflow-y:auto}
#feature-panel.vis{display:block}

/* ── Grid helpers ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g32{display:grid;grid-template-columns:3fr 2fr;gap:16px}
.g22s{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* ── Misc ── */
.mono{font-family:'Courier New',monospace;font-size:12px}
.gap-y{margin-bottom:16px}
.gap-y-sm{margin-bottom:8px}
.row{display:flex;align-items:center}
.row-sb{display:flex;align-items:center;justify-content:space-between}
.col{display:flex;flex-direction:column}
.text-sm{font-size:13px}
.text-xs{font-size:12px}
.text-lg{font-size:18px}
.text-xl{font-size:22px}
.text-2xl{font-size:28px}
.fw5{font-weight:500}
.fw6{font-weight:600}
.fw7{font-weight:700}
.tc2{color:var(--t2)}
.tc3{color:var(--t3)}
.tca{color:var(--accent)}
.tcs{color:var(--success)}
.tcd{color:var(--danger)}
.tcw{color:var(--warning)}
.mb4{margin-bottom:4px}
.mb8{margin-bottom:8px}
.mb12{margin-bottom:12px}
.mb16{margin-bottom:16px}
.mb20{margin-bottom:20px}
.mb24{margin-bottom:24px}
.pt8{padding-top:8px}
.flex1{flex:1}
.shrink0{flex-shrink:0}
.rounded{border-radius:8px}
.overcard{border-radius:12px;border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow)}
.stack{display:flex;flex-direction:column;gap:16px}
.input-f{background:var(--f3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-family:inherit;font-size:14px;color:var(--t1);width:100%;outline:none;transition:border-color .15s,box-shadow .15s}
.input-f:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,127,255,0.12)}
.w-full{width:100%}
.ta-right{text-align:right}

/* ── SVG icons inline ── */
.icon-bell,.icon-agent{stroke:currentColor;fill:none}

/* ── QR placeholder ── */
.qr-wrap{width:160px;height:160px;background:var(--f3);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden}

/* ── Scrollable ── */
.scroll-x{overflow-x:auto}

/* ── Receipt token ── */
.pill-receipt{background:rgba(139,92,246,0.12);color:#7c3aed}
.receipt-section-label{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--f2);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.receipt-row{display:flex;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border);opacity:0.85}
.receipt-row:last-child{border-bottom:none}
.toggle-sm{display:inline-flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
.toggle-sm-track{width:32px;height:18px;border-radius:9px;position:relative;transition:background .2s;flex-shrink:0}
.toggle-sm-thumb{position:absolute;top:3px;width:12px;height:12px;border-radius:50%;background:#fff;transition:left .15s;box-shadow:0 1px 2px rgba(0,0,0,0.2)}

@media(max-width:640px){
  #sidebar{display:none}
  #main{padding:16px}
}
</style>
</head>
<body>
<div id="app">
  <!-- ── Sidebar ── -->
  <nav id="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-icon">V</div>
      Portfolio
    </div>
    <div class="nav-group-label">Dashboard</div>
    <div class="nav-item" onclick="goTo('dashboard-unauth')" id="nav-dashboard-unauth">未登录</div>
    <div class="nav-item" onclick="goTo('dashboard-empty')" id="nav-dashboard-empty">无资产</div>
    <div class="nav-item active" onclick="goTo('dashboard')" id="nav-dashboard">有资产</div>

    <div class="nav-group-label">Detail</div>
    <div class="nav-item" onclick="goTo('asset-detail')" id="nav-asset-detail">资产详情</div>
    <div class="nav-item" onclick="goTo('activity-detail')" id="nav-activity-detail">账户活动</div>
    <div class="nav-item" onclick="goTo('agent-trading')" id="nav-agent-trading">Agent Trading</div>
    <div class="nav-item" onclick="goTo('staking-detail')" id="nav-staking-detail">质押详情</div>
    <div class="nav-item" onclick="goTo('token-detail')" id="nav-token-detail">Token Detail</div>
    <div class="nav-item" onclick="goTo('transaction-detail')" id="nav-transaction-detail">交易详情</div>

    <div class="nav-group-label">转账</div>
    <div class="nav-item" onclick="goTo('send-l1')" id="nav-send-l1">L1</div>
    <div class="nav-item" onclick="goTo('send-l2')" id="nav-send-l2">L2</div>
    <div class="nav-item" onclick="goTo('send-l3')" id="nav-send-l3">L3</div>
    <div class="nav-item" onclick="goTo('send-form')" id="nav-send-form">表单</div>

    <div class="nav-group-label">收款</div>
    <div class="nav-item" onclick="goTo('receive-l1')" id="nav-receive-l1">L1</div>
    <div class="nav-item" onclick="goTo('receive-l2')" id="nav-receive-l2">L2</div>
    <div class="nav-item" onclick="goTo('receive-qr')" id="nav-receive-qr">QR</div>
  </nav>

  <!-- ── Main content ── -->
  <main id="main"></main>
</div>

<!-- ── Feature Info Panel ── -->
<div id="feature-panel">
  <div class="row-sb mb8">
    <div>
      <div id="fp-label" class="text-xs tc3 mb4"></div>
      <div class="row" style="gap:8px;align-items:center">
        <div id="fp-title" class="fw6" style="font-size:14px"></div>
        <span id="fp-priority" class="pill pill-accent"></span>
      </div>
    </div>
    <button onclick="hideFeaturePanel()" style="background:none;border:none;cursor:pointer;font-size:18px;color:var(--t3);line-height:1;padding:2px 6px;">×</button>
  </div>
  <div id="fp-desc" class="text-xs tc2" style="line-height:1.7;white-space:pre-line"></div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// Feature Registry
// ─────────────────────────────────────────────────────────────────────────────
const F = {
  dashboardUnauth:{title:"未登录状态",label:"Dashboard",priority:"P0",desc:"用户未连接钱包时的 Dashboard 状态。\n\n· 显示产品简介与价值主张\n· 提供「Connect Wallet」入口\n· 不展示任何资产信息\n· 此状态下功能入口、资产概览、账户活动均不可见"},
  dashboardEmpty:{title:"已登录无资产",label:"Dashboard",priority:"P0",desc:"用户已连接钱包但尚无任何资产时的 Dashboard 状态。\n\n· 资产概览显示空状态（$0.00）\n· 账户活动显示「No transactions yet」\n· 功能入口仍可用（收款是获取首笔资产的起点）"},
  assetOverview:{title:"资产概览",label:"Dashboard · 已登录有资产",priority:"P0",desc:"Dashboard 核心区块，汇总展示用户在所有链上的资产。\n\n· Donut 图按资产类别展示占比（Token / DeFi）\n· 总资产 = Token 估值 + DeFi 仓位估值\n· NFT 在独立 Tab 中展示但不计入总资产估值\n· 点击进入资产详情页"},
  assetTabToken:{title:"Token Tab（含凭证代币）",label:"资产概览",priority:"P0",desc:"资产概览的 Token Tab，核心功能即 Unified Balance。\n\n· 显示 Token 持仓总估值，标注 receipts excluded 数量\n· 代币列表按法币价值降序排列，跨链同代币自动合计\n· Dust 标签：有报价且法币 < $0.10\n· Receipt 代币（stETH / aUSDC / LP）：显示但不计入总额，标注「in DeFi」提示\n· 提供「Hide receipts」一键过滤开关"},
  assetTabDefi:{title:"DeFi Tab",label:"资产概览",priority:"P0",desc:"资产概览的 DeFi Tab，展示 DeFi 协议仓位。\n\n· 包含 ETH 质押（Lido、Native Staking）、Lending（Aave）、LP（Uniswap）、Staking（Hyperliquid）\n· 每个仓位展示：协议名、类型、链、当前净值、APY / APR"},
  assetTabNft:{title:"NFT Tab（仅查看）",label:"资产概览",priority:"P1",desc:"资产概览的 NFT Tab，展示用户持有的 NFT 资产。\n\n· NFT 参考估值基于地板价，非精确市值\n· NFT 不计入头部总资产估值（仅供查看）\n· Tab 内有醒目提示，避免用户误读头部总额"},
  unifiedBalance:{title:"Unified Balance（Donut 图）",label:"资产概览 · Token",priority:"P0",desc:"以 Donut 图直观展示资产构成占比。\n\n· 总资产 = Token（68.6%）+ DeFi（31.4%）\n· NFT 不计入总资产\n· 覆盖 Arbitrum / HyperEVM / Ethereum\n· 排除隐藏账户\n· Receipt token 不参与 Token 总额计算"},
  dustToken:{title:"Dust 代币",label:"资产概览 · Token",priority:"P1",desc:"判定条件：余额 > 0 且有有效报价且法币总价值 < $0.10。\n\n· 保留在主列表（不移入「Previously held」，余额非零）\n· 名称旁显示橙色「Dust」标签\n· 法币价值字段以次要颜色显示实际金额，不隐藏数值\n· 依法币价值降序排序，自然排在正常资产之后\n· 计入 Unified Balance（有有效报价即计入）"},
  accountActivity:{title:"账户活动",label:"Dashboard · 已登录有资产",priority:"P0",desc:"展示近期跨链交易记录的预览（最多 5 条）。\n\n· 每条记录包含：操作类型、代币、时间、金额\n· 点击任意交易行 → 进入交易详情页\n· 「查看详情」链接到完整的 Transaction History 页面"},
  transactionDetail:{title:"交易详情页",label:"账户活动",priority:"P0",desc:"单笔交易的完整详情页，从账户活动点击进入。\n\n包含字段：\n· 交易类型、代币与金额\n· 所在网络、发送方/接收方地址\n· 时间戳、交易状态、Gas 费用、Tx Hash"},
  featureEntry:{title:"功能入口",label:"Dashboard · 已登录有资产",priority:"P0",desc:"Dashboard 顶部的核心操作入口：\n· 收款 — 进入收款三层级流程\n· 转账 — 进入转账三层级流程（主要 CTA）\n· 质押 — 进入质押详情\n· Agent Trading — AI 自动交易"},
  receiveEntry:{title:"收款入口",label:"功能入口",priority:"P0",desc:"点击后进入收款三层级流程：\n① L1 选择代币\n② L2 选择公链\n③ QR Code 展示完整地址\n\n地址最后一刻才揭露。"},
  sendEntry:{title:"转账入口",label:"功能入口",priority:"P0",desc:"点击后进入转账三层级流程：\n① L1 选择代币\n② L2 选择公链\n③ L3 选择转出地址（条件式）\n\n完成层级选择后才进入转账表单，不得绕过。"},
  stakingEntry:{title:"质押服务入口",label:"Dashboard · 已登录有资产",priority:"P0",desc:"Dashboard 底部的质押服务卡片。\n\n· 展示 ETH 质押当前 APY\n· 显示用户已质押总额\n· 点击进入质押详情页"},
  stakingDetail:{title:"质押详情页",label:"质押服务",priority:"P0",desc:"ETH 质押详情页。\n\n· 质押总额与累计收益、当前 APY\n· 质押仓位列表\n· 收益记录\n· 质押 / 赎回 操作按钮"},
  agentTrading:{title:"Agent Trading 入口",label:"Dashboard · 已登录有资产",priority:"P0",desc:"AI 驱动的 DeFi 自动化交易入口，提供两种模式：\n· 全局 Agent — 单一 Agent 授权操作所有 DeFi 协议\n· 协议 Agent — 每个 DeFi 协议绑定专属 Agent"},

function polarPt(cx,cy,r,deg){const rad=(deg-90)*Math.PI/180;return{x:cx+r*Math.cos(rad),y:cy+r*Math.sin(rad)}}
function donutPath(cx,cy,ri,ro,s,e){
  const S1=polarPt(cx,cy,ro,s),E1=polarPt(cx,cy,ro,e),S2=polarPt(cx,cy,ri,e),E2=polarPt(cx,cy,ri,s);
  const lg=(e-s)>180?1:0;
  return `M${S1.x.toFixed(2)},${S1.y.toFixed(2)} A${ro},${ro} 0 ${lg} 1 ${E1.x.toFixed(2)},${E1.y.toFixed(2)} L${S2.x.toFixed(2)},${S2.y.toFixed(2)} A${ri},${ri} 0 ${lg} 0 ${E2.x.toFixed(2)},${E2.y.toFixed(2)} Z`
}
function buildDonutSVG(segments, cx=90, cy=90, ri=54, ro=80, size=180){
  const total=segments.reduce((s,d)=>s+d.value,0);
  let start=0, paths='';
  for(const d of segments){
    const angle=(d.value/total)*360;
    const end=start+angle;
    if(angle<360){
      paths+=`<path d="${donutPath(cx,cy,ri,ro,start,end)}" fill="${d.color}" opacity="${d.opacity||1}"/>`;
    }
    start=end;
  }
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="flex-shrink:0">${paths}</svg>`;
}

function linePts(vals,w,h,pad=10){
  const n=vals.length, mn=Math.min(...vals), mx=Math.max(...vals), rng=mx-mn||1;
  return vals.map((v,i)=>[pad+i/(n-1)*(w-2*pad),pad+(1-(v-mn)/rng)*(h-2*pad)]);
}
function buildLineSVG(vals, w, h, color='#22c55e', fill=true, id='lg'+Math.random().toString(36).slice(2)){
  const pts=linePts(vals,w,h);
  const d=pts.map((p,i)=>`${i?'L':'M'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
  const area=d+` L${pts[pts.length-1][0].toFixed(1)},${h} L${pts[0][0].toFixed(1)},${h} Z`;
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="overflow:visible">
    <defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
    </linearGradient></defs>
    ${fill?`<path d="${area}" fill="url(#${id})"/>`:''}
    <path d="${d}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

function buildLineChartWithLabels(data, cats, w, h, color='#5b5bd6'){
  const pad={t:10,r:10,b:28,l:10};
  const ew=w-pad.l-pad.r, eh=h-pad.t-pad.b;
  const vals=data;
  const pts=linePts(vals,ew,eh).map(p=>[p[0]+pad.l,p[1]+pad.t]);
  const d=pts.map((p,i)=>`${i?'L':'M'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
  const area=d+` L${pts[pts.length-1][0].toFixed(1)},${h-pad.b} L${pts[0][0].toFixed(1)},${h-pad.b} Z`;
  const id='lc'+Math.random().toString(36).slice(2);
  // x-axis labels
  const n=cats.length;
  const labels=cats.map((c,i)=>{
    const x=pad.l+i/(n-1)*ew;
    return `<text x="${x.toFixed(1)}" y="${h-8}" text-anchor="middle" font-size="10" fill="#94a3b8">${c}</text>`;
  }).join('');
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="overflow:visible;display:block">
    <defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${area}" fill="url(#${id})"/>
    <path d="${d}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    ${labels}
  </svg>`;
}

function qrSVG(size=160){
  let sq='';
  const cell=7, pad=7;
  function finder(ox,oy){
    for(let r=0;r<7;r++) for(let c=0;c<7;c++){
      const outer=r===0||r===6||c===0||c===6;
      const inner=r>=2&&r<=4&&c>=2&&c<=4;
      if(outer||inner) sq+=`<rect x="${ox+c*cell+pad}" y="${oy+r*cell+pad}" width="${cell}" height="${cell}" fill="#000"/>`;
    }
  }
  finder(0,0); finder(14*cell,0); finder(0,14*cell);
  for(let r=0;r<21;r++) for(let c=0;c<21;c++){
    const tl=(r<7&&c<7), tr=(r<7&&c>13), bl=(r>13&&c<7);
    if(!tl&&!tr&&!bl){
      if(((r*13+c*7)^(r+c*3))%3!==0) sq+=`<rect x="${c*cell+pad}" y="${r*cell+pad}" width="${cell}" height="${cell}" fill="#000"/>`;
    }
  }
  const total=21*cell+2*pad;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${total} ${total}" style="display:block;background:#fff;border-radius:4px"><rect width="${total}" height="${total}" fill="#fff"/>${sq}</svg>`;
}

function buildPortfolioChartSVG(vals, cats){
  const W=680, H=200, padT=28, padR=16, padB=32, padL=44;
  const ew=W-padL-padR, eh=H-padT-padB;
  const mn=Math.min(...vals), mx=Math.max(...vals), rng=mx-mn||1;
  const n=vals.length;
  const pts=vals.map((v,i)=>[padL+i/(n-1)*ew, padT+(1-(v-mn)/rng)*eh]);
  const d=pts.map((p,i)=>`${i?'L':'M'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
  const area=d+` L${pts[n-1][0].toFixed(1)},${H-padB} L${pts[0][0].toFixed(1)},${H-padB} Z`;
  const id='pcg'+Math.random().toString(36).slice(2);
  // Y-axis grid (4 steps)
  const ySteps=4;
  let grid='', yLabels='';
  for(let i=0;i<=ySteps;i++){
    const pct=i/ySteps, y=(padT+pct*eh).toFixed(1);
    const val=mx-pct*rng;
    const lab=val>=1000?`${(val/1000).toFixed(0)}K`:val.toFixed(0);
    grid+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="rgba(17,29,74,0.06)" stroke-width="1"/>`;
    yLabels+=`<text x="${padL-8}" y="${(parseFloat(y)+4).toFixed(1)}" text-anchor="end" font-size="11" fill="#99a1af" font-family="Noto Sans,system-ui,sans-serif">${lab}</text>`;
  }
  // X-axis labels
  const xLabels=cats.map((c,i)=>{
    const x=(padL+i/(n-1)*ew).toFixed(1);
    return `<text x="${x}" y="${H-6}" text-anchor="middle" font-size="11" fill="#99a1af" font-family="Noto Sans,system-ui,sans-serif">${c}</text>`;
  }).join('');
  // Min/max callout labels (top-left=start, top-right=current)
  const fmtVal=v=>'$'+v.toLocaleString();
  const startLabel=fmtVal(vals[0]), endLabel=fmtVal(vals[n-1]);
  return `<div style="position:relative;width:100%">
    <div style="position:absolute;top:4px;left:${padL}px;font-size:11px;font-weight:500;color:var(--t2)">${startLabel}</div>
    <div style="position:absolute;top:4px;right:${padR}px;font-size:11px;font-weight:600;color:var(--success)">${endLabel}</div>
    <svg width="100%" height="${H}" viewBox="0 0 ${W} ${H}" style="overflow:visible;display:block;margin-top:2px">
      <defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#10b981" stop-opacity="0.22"/>
        <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
      </linearGradient></defs>
      ${grid}${yLabels}
      <path d="${area}" fill="url(#${id})"/>
      <path d="${d}" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      ${xLabels}
    </svg>
  </div>`;
}

  ];
  const offChain=[
    {type:'Deposit',label:'Deposit to Aave',time:'3 days ago',amount:'500 USDC',platform:'Aave V3',pos:null},
    {type:'Borrow',label:'Borrow from Aave',time:'3 days ago',amount:'0.05 ETH',platform:'Aave V3',pos:false},
    {type:'AddLP',label:'Add Liquidity',time:'1 week ago',amount:'0.12 ETH + 300 USDC',platform:'Uniswap V3',pos:null},
    {type:'Stake',label:'Stake USDC',time:'1 week ago',amount:'200 USDC',platform:'Hyperliquid',pos:null},
    {type:'Approval',label:'Token Approval',time:'1 week ago',amount:'∞ USDC',platform:'Uniswap V3',pos:null},
    {type:'ClaimReward',label:'Claim Rewards',time:'2 weeks ago',amount:'+4.28 USDC',platform:'Uniswap V3',pos:true}
  ];

  function txIcon(type){
    if(type==='Receive'||type==='ClaimReward') return {icon:'↓',bg:'#ecfdf5',color:'#10b981'};
    if(type==='Send'||type==='Borrow') return {icon:'↑',bg:'rgba(212,24,61,0.1)',color:'#d4183d'};
    if(type==='Approval') return {icon:'✓',bg:'rgba(234,179,8,0.15)',color:'#eab308'};
    if(type==='AddLP') return {icon:'+',bg:'#e0e7ff',color:'#4f46e5'};
    if(type==='Deposit'||type==='Stake') return {icon:'⬇',bg:'#e0e7ff',color:'#4f46e5'};
    return {icon:'↔',bg:'var(--f2)',color:'var(--t2)'};
  }

  const list=S.activityTab==='onchain'?onChain:offChain;

  const rows=list.map((tx,i)=>{
    const ic=txIcon(tx.type);
    const badge='chain' in tx
      ? `<span class="chain-badge" style="background:${chainColor(tx.chain)}22;color:${chainColor(tx.chain)}">${tx.chain}</span>`
      : `<span class="pill pill-neutral" style="font-size:11px">${tx.platform}</span>`;

      <div style="width:36px;height:36px;border-radius:50%;background:${ic.bg};display:flex;align-items:center;justify-content:center;margin-right:14px;flex-shrink:0">

        <div class="text-xs fw5 mb4">${tx.label}</div>
        <div class="row" style="gap:8px">${'time' in tx?`<span class="text-xs tc3">${tx.time}</span>`:''} ${badge}</div>
      </div>
      <div class="ta-right">
        <div class="text-xs fw5" style="color:${tx.pos===true?'var(--success)':tx.pos===false?'var(--danger)':'var(--t1)'}">${tx.amount}</div>
        ${'addr' in tx&&tx.addr?`<div class="mono tc3" style="font-size:10px">${tx.addr}</div>`:''}
      </div>
    </div>`;
  }).join('');

  return `<div class="stack">
    ${portfolioHeader()}
    ${portfolioActions()}
    <div class="overcard">
      <div class="tabs-row">
        <div class="tab-item ${S.activityTab==='onchain'?'active':''}" onclick="switchActivityTab('onchain')">On-Chain Activities</div>

      </div>
      <div id="activityList">${rows}</div>
    </div>
  </div>`;
}

          <div style="background:var(--f3);border-radius:6px;padding:12px 16px;font-family:'Courier New',monospace;font-size:13px;word-break:break-all;margin-bottom:12px;border:1px solid var(--border)">
            0x7f3a4b8cde9f8b2c1a5e3d7c9f2b4a6e
          </div>
          <div class="text-xs tc3" style="line-height:1.6">地址在此最后一刻才完整揭露，此前各层级只展示账户昵称，不提前显示地址文字。</div>
          <div class="row" style="gap:10px;margin-top:16px">
            <button class="btn-accent" onclick="event.stopPropagation()">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              复制地址
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// Navigation & State Mutations
// ─────────────────────────────────────────────────────────────────────────────
function goTo(screen){
  S.screen=screen;
  render();
  updateNav();
}

function setF(key){
  S.fKey=key;
  showFeaturePanel(key);
}

function updateNav(){
  document.querySelectorAll('.nav-item').forEach(el=>{
    const id=el.id.replace('nav-','');
    el.classList.toggle('active',id===S.screen);
  });
}

function switchAssetTab(tab){
  S.assetTab=tab;
  render();
}

function switchActivityTab(tab){
  S.activityTab=tab;
  render();
}

function switchAgentMode(mode){
  S.agentMode=mode;
  render();
}

function toggleNetworkRow(name){
  S.expandedNetworkRow=S.expandedNetworkRow===name?'':name;
  render();
}

function toggleNetworkExpanded(){
  S.networkExpanded=!S.networkExpanded;
  render();
}

function toggleProtocol(name){
  S.expandedProtocol=S.expandedProtocol===name?'':name;
  render();
}

function toggleHideReceipts(){
  S.hideReceipts=!S.hideReceipts;
  render();
}

function switchChartPeriod(p){
  S.chartPeriod=p;
  render();
}

function setTokenPeriod(p){
  S.tokenChartPeriod=p;
  render();
}

function render(){
  const main=document.getElementById('main');
  switch(S.screen){
    case 'dashboard-unauth': main.innerHTML=renderDashboardUnauth(); break;
    case 'dashboard-empty':  main.innerHTML=renderDashboardEmpty();  break;
    case 'dashboard':        main.innerHTML=renderDashboard();       break;
    case 'asset-detail':     main.innerHTML=renderAssetDetail();     break;
    case 'activity-detail':  main.innerHTML=renderActivityDetail();  break;
    case 'agent-trading':    main.innerHTML=renderAgentTrading();    break;
    case 'staking-detail':   main.innerHTML=renderStakingDetail();   break;
    case 'token-detail':     main.innerHTML=renderTokenDetail();     break;
    case 'transaction-detail': main.innerHTML=renderTransactionDetail(); break;
    case 'send-l1':          main.innerHTML=renderSendL1();          break;
    case 'send-l2':          main.innerHTML=renderSendL2();          break;
    case 'send-l3':          main.innerHTML=renderSendL3();          break;
    case 'send-form':        main.innerHTML=renderSendForm();        break;
    case 'receive-l1':       main.innerHTML=renderReceiveL1();       break;
    case 'receive-l2':       main.innerHTML=renderReceiveL2();       break;
    case 'receive-qr':       main.innerHTML=renderReceiveQR();       break;
    default:                 main.innerHTML=renderDashboard();
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// Feature Panel
// ─────────────────────────────────────────────────────────────────────────────
function showFeaturePanel(key){
  const info=F[key];
  if(!info) return;
  document.getElementById('fp-label').textContent=info.label;
  document.getElementById('fp-title').textContent=info.title;
  const pEl=document.getElementById('fp-priority');
  pEl.textContent=info.priority;
  pEl.className='pill '+(info.priority==='P0'?'pill-accent':'pill-neutral');
  document.getElementById('fp-desc').textContent=info.desc;
  document.getElementById('feature-panel').classList.add('vis');
}

function hideFeaturePanel(){
  document.getElementById('feature-panel').classList.remove('vis');
}

// ─────────────────────────────────────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────────────────────────────────────
render();
updateNav();
</script>
</body>
</html>
