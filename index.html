<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Portfolio 原型 · PRD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
    <style>
      /* Portfolio PRD Prototype — 深色钱包风格 */
      :root {
        --bg: #0c0e12;
        --surface: #141820;
        --surface2: #1a202c;
        --border: rgba(255, 255, 255, 0.08);
        --text: #f1f5f9;
        --muted: #94a3b8;
        --muted2: #64748b;
        --accent: #38bdf8;
        --accent-dim: rgba(56, 189, 248, 0.15);
        --orange: #fb923c;
        --orange-bg: rgba(251, 146, 60, 0.12);
        --success: #34d399;
        --radius: 14px;
        --radius-sm: 10px;
        --font: "DM Sans", "SF Pro Display", system-ui, sans-serif;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
      }

      button {
        font-family: inherit;
        cursor: pointer;
        border: none;
        background: none;
        color: inherit;
      }

      .app {
        max-width: 420px;
        margin: 0 auto;
        min-height: 100vh;
        padding: 20px 18px 32px;
        position: relative;
      }

      .screen {
        display: none;
        animation: fadeIn 0.22s ease;
      }

      .screen.is-active {
        display: block;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .top-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 20px;
      }

      .back-btn {
        width: 40px;
        height: 40px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--muted);
        transition: background 0.15s, color 0.15s;
        flex-shrink: 0;
      }

      .back-btn:hover {
        background: var(--surface2);
        color: var(--text);
      }

      .page-title {
        font-size: 1.05rem;
        font-weight: 600;
        letter-spacing: -0.02em;
      }

      .wallet-card {
        background: linear-gradient(160deg, #181e2a 0%, #0e1118 100%);
        border: 1px solid rgba(255,255,255,0.07);
        border-radius: var(--radius);
        padding: 16px 18px 14px;
        margin-bottom: 14px;
        position: relative;
        overflow: hidden;
      }

      .wallet-card::after {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(56,189,248,0.25), transparent);
      }

      .wallet-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .wallet-name {
        font-size: 1.1rem;
        font-weight: 600;
        letter-spacing: -0.02em;
        color: var(--muted);
      }

      .wallet-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--accent), #7c3aed);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.8rem;
        font-weight: 700;
        color: #fff;
        letter-spacing: 0;
      }

      .unified {
        text-align: center;
        padding: 6px 0 16px;
      }

      .unified-label {
        font-size: 0.72rem;
        color: var(--muted2);
        text-transform: uppercase;
        letter-spacing: 0.14em;
        margin-bottom: 8px;
      }

      .unified-value {
        font-size: 2.4rem;
        font-weight: 700;
        letter-spacing: -0.04em;
        font-variant-numeric: tabular-nums;
        background: linear-gradient(180deg, #f1f5f9 60%, #94a3b8 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .section-label {
        font-size: 0.72rem;
        color: var(--muted2);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin: 8px 0 12px 4px;
      }

      .token-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .token-row {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 14px 14px 12px;
        display: flex;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        transition: border-color 0.18s, background 0.18s, transform 0.1s;
        text-align: left;
        width: 100%;
      }

      .token-row:hover {
        border-color: rgba(56, 189, 248, 0.35);
        background: var(--surface2);
      }

      .token-row:active {
        transform: scale(0.985);
      }

      .token-row.dust {
        opacity: 0.8;
      }

      .token-icon {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: var(--surface2);
        flex-shrink: 0;
        overflow: hidden;
        border: 1px solid var(--border);
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.04) inset;
      }

      .token-icon img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .hero-icon-wrap {
        width: 64px;
        height: 64px;
        margin: 0 auto 14px;
        border-radius: 50%;
        overflow: hidden;
        border: 1px solid var(--border);
        background: var(--surface2);
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.45);
      }

      .hero-icon-wrap img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .token-main {
        flex: 1;
        min-width: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .token-info {
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 0;
      }

      .token-line1 {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .token-symbol {
        font-weight: 700;
        font-size: 0.98rem;
        letter-spacing: -0.01em;
      }

      .token-fullname {
        font-size: 0.78rem;
        color: var(--muted2);
      }

      .dust-badge {
        font-size: 0.6rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--orange);
        background: var(--orange-bg);
        padding: 2px 7px;
        border-radius: 6px;
        flex-shrink: 0;
      }

      .token-values {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 2px;
        flex-shrink: 0;
      }

      .token-balance {
        font-size: 0.92rem;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
        color: var(--text);
        letter-spacing: -0.01em;
      }

      .token-fiat {
        font-size: 0.8rem;
        color: var(--muted2);
        font-variant-numeric: tabular-nums;
      }

      .token-row.dust .token-fiat {
        color: var(--muted2);
      }

      .token-fiat.muted-strong {
        color: var(--muted2);
      }

      .ph-block {
        margin-top: 20px;
        border: 1px dashed var(--border);
        border-radius: var(--radius-sm);
        overflow: hidden;
      }

      .ph-toggle {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 14px;
        color: var(--muted);
        font-size: 0.88rem;
      }

      .ph-toggle:hover {
        background: rgba(255, 255, 255, 0.03);
      }

      .ph-chevron {
        transition: transform 0.2s;
        font-size: 0.75rem;
      }

      .ph-block.is-open .ph-chevron {
        transform: rotate(180deg);
      }

      .ph-content {
        display: none;
        padding: 0 10px 12px;
        flex-direction: column;
        gap: 8px;
      }

      .ph-block.is-open .ph-content {
        display: flex;
      }

      .ph-token {
        font-size: 0.85rem;
        color: var(--muted2);
        padding: 8px 8px;
        background: var(--bg);
        border-radius: 8px;
      }

      .hero {
        text-align: center;
        padding: 12px 0 20px;
      }

      .hero-symbol {
        font-size: 1.75rem;
        font-weight: 700;
        letter-spacing: -0.03em;
      }

      .hero-total {
        font-size: 0.95rem;
        color: var(--muted);
        margin-top: 6px;
        font-variant-numeric: tabular-nums;
      }

      .dust-banner {
        background: var(--orange-bg);
        border: 1px solid rgba(251, 146, 60, 0.25);
        border-radius: var(--radius-sm);
        padding: 12px 14px;
        margin-bottom: 16px;
        font-size: 0.82rem;
        color: #fdba74;
        line-height: 1.45;
      }

      .dust-banner strong {
        display: block;
        margin-bottom: 4px;
        color: var(--orange);
      }

      .network-block {
        margin-bottom: 20px;
      }

      .network-label {
        font-size: 0.72rem;
        color: var(--muted2);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 10px;
      }

      .chain-list {
        display: flex;
        flex-direction: column;
        gap: 0;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        overflow: hidden;
      }

      .chain-row-wrap {
        border-bottom: 1px solid var(--border);
      }

      .chain-row-wrap:last-child {
        border-bottom: none;
      }

      .chain-row {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 14px;
        background: var(--surface);
        transition: background 0.12s;
      }

      .chain-row:hover {
        background: var(--surface2);
      }

      .chain-name {
        font-weight: 500;
        font-size: 0.92rem;
      }

      .chain-amt {
        font-size: 0.9rem;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
      }

      .chain-chev {
        margin-left: 8px;
        font-size: 0.7rem;
        color: var(--muted2);
        width: 1.2em;
        display: inline-block;
        text-align: center;
        transition: transform 0.22s ease;
      }

      .chain-row-wrap.is-expanded .chain-chev {
        transform: rotate(90deg);
      }

      /* 链彩色圆点 */
      .chain-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
        display: inline-block;
        vertical-align: middle;
        margin-right: 2px;
      }

      /* 步骤条挂载时重置父容器的文字变形 */
      #receive-step,
      #send-step {
        text-transform: none;
        letter-spacing: normal;
        font-size: 1rem;
        color: inherit;
        margin-bottom: 0;
      }

      .l2-panel {
        background: #0a0c10;
        padding: 0 10px 0;
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.28s ease, padding 0.2s ease;
      }

      .chain-row-wrap.is-expanded .l2-panel {
        max-height: 600px;
        padding: 0 10px 10px;
      }

      .addr-row {
        display: flex;
        flex-direction: column;
        gap: 2px;
        padding: 10px 10px;
        border-radius: 8px;
        background: var(--surface);
        margin-top: 6px;
        border: 1px solid var(--border);
      }

      .addr-account {
        font-size: 0.85rem;
        font-weight: 500;
      }

      .addr-line {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 8px;
      }

      .addr-balance {
        font-size: 0.8rem;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
      }

      .addr-hex {
        font-size: 0.72rem;
        color: var(--muted2);
        font-family: ui-monospace, monospace;
        word-break: break-all;
      }

      .addr-row-btn {
        width: 100%;
        text-align: left;
        cursor: pointer;
        transition: border-color 0.18s, background 0.18s;
        -webkit-appearance: none;
        appearance: none;
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 8px;
      }

      .addr-row-btn .addr-content {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .addr-row-btn .addr-arrow {
        flex-shrink: 0;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.08);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--muted2);
        transition: background 0.15s, border-color 0.15s, color 0.15s;
      }

      .addr-row-btn:hover .addr-arrow {
        background: rgba(56,189,248,0.15);
        border-color: rgba(56,189,248,0.35);
        color: var(--accent);
      }

      .addr-row-btn:hover {
        border-color: rgba(56, 189, 248, 0.4);
        background: var(--surface2);
      }

      .addr-tx-hint {
        font-size: 0.65rem;
        color: var(--muted2);
        margin-top: 4px;
        display: flex;
        align-items: center;
        gap: 3px;
      }

      .addr-tx-hint svg {
        flex-shrink: 0;
      }

      .addr-hint {
        font-size: 0.68rem;
        color: var(--muted2);
        margin-top: 6px;
      }

      .tx-block {
        margin-bottom: 18px;
      }

      .tx-home-body {
        padding-bottom: 8px;
      }

      .tx-home-body .tx-list {
        max-height: none;
        overflow: visible;
      }

      .tx-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 10px;
        background: rgba(0, 0, 0, 0.2);
        max-height: 280px;
        overflow-y: auto;
      }

      .tx-row {
        padding: 11px 12px;
        background: var(--surface);
        border-radius: 10px;
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .tx-icon {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.8rem;
      }

      .tx-icon.pos {
        background: rgba(52,211,153,0.15);
        color: var(--success);
      }

      .tx-icon.neg {
        background: rgba(248,113,113,0.15);
        color: #f87171;
      }

      .tx-icon.swap {
        background: rgba(56,189,248,0.12);
        color: var(--accent);
      }

      .tx-body {
        flex: 1;
        min-width: 0;
      }

      .tx-row-top {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 10px;
      }

      .tx-kind {
        font-size: 0.84rem;
        font-weight: 600;
        color: var(--text);
      }

      .tx-amt {
        font-size: 0.88rem;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
      }

      .tx-amt.pos {
        color: var(--success);
      }

      .tx-amt.neg {
        color: #f87171;
      }

      .tx-row-meta {
        font-size: 0.72rem;
        color: var(--muted2);
        margin-top: 6px;
        line-height: 1.35;
      }

      .tx-addr-sub {
        font-size: 0.8rem;
        color: var(--muted);
        padding: 0 0 14px;
        line-height: 1.45;
      }

      /* ──── 首页快捷操作栏 ──── */
      .home-action-bar {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin: 4px 0 20px;
      }

      .home-action-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        background: none;
        border: none;
        cursor: pointer;
        color: var(--text);
        transition: opacity 0.15s, transform 0.12s;
        padding: 0;
        min-width: 64px;
      }

      .home-action-btn:active {
        transform: scale(0.93);
      }

      .home-action-icon {
        width: 56px;
        height: 56px;
        border-radius: 18px;
        background: var(--surface);
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s, border-color 0.15s;
      }

      .home-action-btn:hover .home-action-icon {
        background: var(--surface2);
        border-color: rgba(56, 189, 248, 0.3);
      }

      .home-action-icon.primary-icon {
        background: linear-gradient(145deg, #38bdf8, #0ea5e9);
        border-color: transparent;
      }

      .home-action-btn:hover .home-action-icon.primary-icon {
        filter: brightness(1.08);
        border-color: transparent;
      }

      .home-action-icon svg {
        width: 22px;
        height: 22px;
      }

      .home-action-label {
        font-size: 0.76rem;
        font-weight: 500;
        color: var(--muted);
        letter-spacing: 0.01em;
      }

      /* ──── 代币详情 / 转收款通用操作区 ──── */
      .actions {
        display: flex;
        gap: 10px;
        margin-top: 8px;
      }

      .actions.detail-actions {
        margin-top: 0;
        margin-bottom: 18px;
      }

      .btn {
        flex: 1;
        padding: 13px 16px;
        border-radius: 12px;
        font-size: 0.92rem;
        font-weight: 600;
        transition: transform 0.1s, filter 0.15s, background 0.15s;
      }

      .btn:active {
        transform: scale(0.97);
      }

      .btn-secondary {
        background: var(--surface2);
        border: 1px solid var(--border);
        color: var(--text);
      }

      .btn-secondary:hover {
        background: #252d3a;
        border-color: rgba(255,255,255,0.12);
      }

      .btn-primary {
        background: linear-gradient(180deg, #38bdf8, #0ea5e9);
        color: #0c1220;
        font-weight: 700;
      }

      .btn-primary:hover {
        filter: brightness(1.07);
      }

      .receive-header {
        margin-bottom: 8px;
      }

      .receive-step-label {
        font-size: 0.72rem;
        color: var(--muted2);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 14px;
      }

      /* ──── 步骤进度条 ──── */
      .step-progress {
        display: flex;
        align-items: center;
        gap: 0;
        margin-bottom: 24px;
      }

      .step-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        flex: 1;
      }

      .step-dot {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 2px solid var(--border);
        background: var(--surface2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.75rem;
        font-weight: 700;
        color: var(--muted2);
        transition: all 0.2s;
        position: relative;
        z-index: 1;
      }

      .step-dot.active {
        border-color: var(--accent);
        background: var(--accent-dim);
        color: var(--accent);
        box-shadow: 0 0 0 4px rgba(56,189,248,0.12);
      }

      .step-dot.done {
        border-color: var(--success);
        background: rgba(52,211,153,0.15);
        color: var(--success);
      }

      .step-name {
        font-size: 0.65rem;
        color: var(--muted2);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        white-space: nowrap;
        font-weight: 500;
      }

      .step-name.active {
        color: var(--accent);
      }

      .step-name.done {
        color: var(--success);
      }

      .step-connector {
        flex: 1;
        height: 2px;
        background: var(--border);
        margin-bottom: 22px;
        transition: background 0.2s;
      }

      .step-connector.done {
        background: var(--success);
      }

      .option-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .option-btn {
        width: 100%;
        text-align: left;
        padding: 14px 16px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        font-size: 0.95rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        transition: border-color 0.15s, background 0.15s;
      }

      .option-btn:hover {
        border-color: rgba(56, 189, 248, 0.4);
        background: var(--surface2);
      }

      /* 选代币：图标 + 简称 / 全称分行 */
      .option-btn-token {
        align-items: center;
      }

      .option-btn-token .token-icon {
        width: 38px;
        height: 38px;
        flex-shrink: 0;
      }

      .option-token-row {
        display: flex;
        align-items: center;
        gap: 12px;
        flex: 1;
        min-width: 0;
      }

      .option-token-text {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 3px;
        min-width: 0;
      }

      .option-token-ticker {
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: -0.03em;
        color: var(--text);
      }

      .option-token-fullname {
        font-size: 0.78rem;
        font-weight: 400;

          return n.toLocaleString("en-US", { style: "currency", currency: "USD", minimumFractionDigits: 2, maximumFractionDigits: 2 });

        function tokenIconHtml(t) {

        function formatTxTime(iso) {
          var d = new Date(iso);
          if (isNaN(d.getTime())) return iso;
          return d.toLocaleString("zh-CN", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
        }

        /** 首页：钱包内全部代币、全部网络的流水聚合 */
        function filterTxForAllTokens() {
          return TX_ENTRIES.slice().sort(function (a, b) {
            return new Date(b.time) - new Date(a.time);
          });
        }

        function filterTxForAddress(tokenId, chain, account) {
          return TX_ENTRIES.filter(function (x) {
            return x.tokenId === tokenId && x.chain === chain && x.account === account;
          }).sort(function (a, b) {
            return new Date(b.time) - new Date(a.time);
          });
        }

        function txIconHtml(kind, sign) {
          var cls = kind === "swap" ? "swap" : sign;
          var icon;
          if (kind === "receive") {
            icon = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>';
          } else if (kind === "send") {
            icon = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>';
          } else {
            icon = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>';
          }
          return '<div class="tx-icon ' + cls + '">' + icon + '</div>';
        }

        function renderTxRowsHtmlHome(entries) {

          }

            .map(function (tx) {
              var t = TOKENS[tx.tokenId];
              var sym = t ? t.symbol : tx.tokenId;
              var kl = kindMap[tx.kind] || tx.kind;
              var sign = tx.amount.trim().indexOf("-") === 0 ? "neg" : "pos";
              return (
                '<div class="tx-row">' +
                txIconHtml(tx.kind, sign) +
                '<div class="tx-body">' +
                '<div class="tx-row-top">' +
                '<span class="tx-kind">' +
                sym + " · " + kl +
                "</span>" +
                '<span class="tx-amt ' + sign + '">' +
                tx.amount + " " + sym +
                "</span>" +
                "</div>" +
                '<div class="tx-row-meta">' +
                chainDotHtml(tx.chain) + " " +
                tx.chain + " · " + tx.account + " · " + formatTxTime(tx.time) +
                "</div>" +
                "</div>" +
                "</div>"
              );
            })
            .join("");
        }

        /** 单地址交易页：副行仅显示时间（网络·账户已在页头） */

          var kindMap = { send: "发送", receive: "收款", swap: "兑换" };
          if (entries.length === 0) {
            return '<p class="recv-meta" style="padding:8px">暂无交易记录</p>';
          }
          return entries
            .map(function (tx) {
              var kl = kindMap[tx.kind] || tx.kind;
              var sign = tx.amount.trim().indexOf("-") === 0 ? "neg" : "pos";
              return (
                '<div class="tx-row">' +
                txIconHtml(tx.kind, sign) +
                '<div class="tx-body">' +
                '<div class="tx-row-top">' +
                '<span class="tx-kind">' + kl + "</span>" +
                '<span class="tx-amt ' + sign + '">' +
                tx.amount + " " + symbol +
                "</span>" +
                "</div>" +
                '<div class="tx-row-meta">' + formatTxTime(tx.time) + "</div>" +
                "</div>" +
                "</div>"

        function chainDotHtml(chain) {

          return '<span class="chain-dot" style="background:' + color + '" aria-hidden="true"></span>';

        /** step: 1-based; total: total steps; labels: array */
        function stepProgressHtml(step, labels) {
          var html = '<div class="step-progress">';
          for (var i = 0; i < labels.length; i++) {
            var dotClass = i + 1 < step ? "step-dot done" : (i + 1 === step ? "step-dot active" : "step-dot");
            var nameClass = i + 1 < step ? "step-name done" : (i + 1 === step ? "step-name active" : "step-name");
            var icon = i + 1 < step
              ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
              : (i + 1);
            html += '<div class="step-item">';
            html += '<div class="' + dotClass + '">' + icon + '</div>';
            html += '<span class="' + nameClass + '">' + labels[i] + '</span>';
            html += '</div>';
            if (i < labels.length - 1) {
              var connClass = i + 1 < step ? "step-connector done" : "step-connector";
              html += '<div class="' + connClass + '"></div>';
            }
          }
          html += '</div>';
          return html;
        }

          Object.keys(screens).forEach(function (k) {
            screens[k].classList.remove("is-active");

          state.view = name;
          window.scrollTo(0, 0);

        function renderHome() {
          el.unifiedTotal.textContent = formatUsd(totalBalanceFiat());

          var order = Object.keys(TOKENS).sort(function (a, b) {
            var fa = TOKENS[a].fiat != null ? TOKENS[a].fiat : 0;

            return fb - fa;
          });

          el.tokenList.innerHTML = order
            .map(function (id) {
              var t = TOKENS[id];
              var dust = t.dust ? " dust" : "";
              var fiatHtml =
                t.fiat != null
                  ? '<div class="token-fiat">' + formatUsd(t.fiat) + "</div>"
                  : '<div class="token-fiat muted-strong">—</div>';
              var dustBadge = t.dust ? '<span class="dust-badge">Dust</span>' : "";
              return (
                '<button type="button" class="token-row' +
                dust +
                '" data-token="' +
                id +
                '">' +
                tokenIconHtml(t) +
                '<div class="token-main">' +
                '<div class="token-info">' +
                '<div class="token-line1">' +
                '<span class="token-symbol">' +
                t.symbol +
                "</span>" +
                dustBadge +
                "</div>" +
                '<span class="token-fullname">' +
                t.name +
                "</span>" +
                "</div>" +
                '<div class="token-values">' +

                t.balance +
                " " +
                t.symbol +
                "</div>" +
                fiatHtml +
                "</div>" +
                "</div>" +
                "</button>"
              );
            })
            .join("");
        }

        function renderDetail(tokenId) {
          var t = TOKENS[tokenId];
          var dist = DISTRIBUTION[tokenId];

          el.detailTitle.textContent = t.symbol;
          var fiatStr = t.fiat != null ? formatUsd(t.fiat) : "—";
          el.detailHero.innerHTML =
            '<div class="hero-icon-wrap"><img src="' +
            t.iconUrl +
            '" alt="" width="64" height="64" loading="lazy" decoding="async" referrerpolicy="no-referrer" /></div>' +
            '<div class="hero-symbol">' +
            t.symbol +
            "</div>" +
            '<div class="hero-total">合计：' +
            t.balance +
            " " +
            t.symbol +
            "（" +
            fiatStr +
            "）</div>";

          if (t.dust) {
            el.dustBanner.classList.remove("hidden");
            el.dustBanner.innerHTML =
              "<strong>Dust — 估值低于 $0.10</strong>" + "余额极小，可通过 Send 或 Swap 处理。";
          } else {
            el.dustBanner.classList.add("hidden");
          }

          el.chainList.innerHTML = CHAINS.filter(function (chain) {
            return dist == null || dist[chain] !== undefined;
          }).map(function (chain) {
            var amt = dist[chain] != null ? dist[chain] : "0";
            var symbol = t.symbol;
            var key = tokenId + "-" + chain;
            return (
              '<div class="chain-row-wrap" data-chain="' +
              chain +
              '" data-token="' +
              tokenId +
              '">' +
              '<button type="button" class="chain-row" aria-expanded="false">' +
              '<span style="display:flex;align-items:center;gap:6px">' +
              chainDotHtml(chain) +
              '<span class="chain-name">' +
              chain +
              "</span></span>" +
              '<span><span class="chain-amt">' +
              amt +
              " " +
              symbol +
              '</span><span class="chain-chev">›</span></span>' +
              "</button>" +
              '<div class="l2-panel" id="l2-' +

              '"></div>' +
              "</div>"
            );
          }).join("");

          el.chainList.querySelectorAll(".chain-row-wrap").forEach(function (wrap) {
            var chain = wrap.dataset.chain;
            var tid = wrap.dataset.token;
            var key = tid + "-" + chain;
            var addrs = ADDRESSES[key] || [];
            var panel = wrap.querySelector(".l2-panel");

            wrap.querySelector(".chain-row").addEventListener("click", function () {
              var isOpen = wrap.classList.toggle("is-expanded");
              wrap.querySelector(".chain-row").setAttribute("aria-expanded", String(isOpen));
              var chev = wrap.querySelector(".chain-chev");
              if (chev) chev.textContent = isOpen ? "⌄" : "›";

              if (isOpen && panel && !panel.dataset.rendered) {
                panel.innerHTML = addrs
                  .map(function (a) {
                    return (
                      '<button type="button" class="addr-row addr-row-btn" data-token="' +
                      tid +
                      '" data-chain="' +
                      chain +
                      '" data-account="' +
                      a.account +
                      '">' +
                      '<div class="addr-content">' +
                      '<div class="addr-line">' +
                      '<span class="addr-account">' +
                      a.account +
                      "</span>" +
                      '<span class="addr-balance">' +
                      a.balance +
                      " " +
                      TOKENS[tid].symbol +
                      "</span>" +
                      "</div>" +
                      '<div class="addr-hex">' +
                      a.address +
                      "</div>" +
                      '<div class="addr-tx-hint">' +
                      '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>' +
                      "查看交易记录" +
                      "</div>" +
                      "</div>" +
                      '<span class="addr-arrow" aria-hidden="true"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>' +
                      "</button>"

                  .join("");
                panel.dataset.rendered = "1";

          document.getElementById("btn-back-detail").onclick = function () {

          document.getElementById("btn-send").onclick = function () {
            openSendFromToken();
          };
          document.getElementById("btn-receive-detail").onclick = function () {
            openReceiveFromToken();
          };

        function getReceiveAddresses(tokenId, chain) {
          var key = tokenId + "-" + chain;
          return ADDRESSES[key] || [];
        }

        /** 仅列出该代币在该链上余额 > 0 的网络（PRD 转账 L2） */
        function getChainsWithBalance(tokenId) {
          var dist = DISTRIBUTION[tokenId] || {};
          return CHAINS.filter(function (c) {
            return parseFloat(dist[c] || "0") > 0;
          });
        }

        function findAddressRow(tokenId, chain, account) {
          var list = getReceiveAddresses(tokenId, chain);
          for (var i = 0; i < list.length; i++) {
            if (list[i].account === account) return list[i];
          }
          return list[0] || null;
        }

        var RECEIVE_STEP_LABELS = ["代币", "公链", "地址"];

        function receiveStepIndex(step) {
          return { token: 1, chain: 2, address: 3, qr: 4 }[step] || 1;
        }

        function renderReceive() {
          var r = state.receive;

          if (r.step === "token") {
            el.receiveTitle.textContent = "收款";
            el.receiveStep.innerHTML = stepProgressHtml(1, RECEIVE_STEP_LABELS);
            el.receiveBody.innerHTML =
              '<div class="option-list">' +
              Object.keys(TOKENS)
                .map(function (k) {
                  return pickTokenOptionHtml(TOKENS[k], "data-pick-token", TOKENS[k].id);
                })
                .join("") +
              "</div>";
            el.receiveBody.querySelectorAll("[data-pick-token]").forEach(function (btn) {
              btn.addEventListener("click", function () {
                r.tokenId = btn.dataset.pickToken;
                r.step = "chain";
                renderReceive();
              });
            });
          } else if (r.step === "chain") {
            var tid = r.tokenId;
            var t = TOKENS[tid];
            el.receiveTitle.textContent = "收款 · " + t.symbol;
            el.receiveStep.innerHTML = stepProgressHtml(2, RECEIVE_STEP_LABELS);
            el.receiveBody.innerHTML =
              '<div class="option-list">' +
              CHAINS.map(function (c) {
                return pickChainOptionHtml(c, "data-pick-chain", c);
              }).join("") +
              "</div>";
            el.receiveBody.querySelectorAll("[data-pick-chain]").forEach(function (btn) {
              btn.addEventListener("click", function () {
                r.chain = btn.dataset.pickChain;
                var list = getReceiveAddresses(r.tokenId, r.chain);
                if (list.length > 1) {
                  r.step = "address";
                } else {
                  r.account = list[0] ? list[0].account : "Main";
                  r.step = "qr";
                }
                renderReceive();
              });
            });
          } else if (r.step === "address") {
            var tid2 = r.tokenId;
            var t2 = TOKENS[tid2];
            var list2 = getReceiveAddresses(tid2, r.chain);
            el.receiveTitle.textContent = "收款 · " + t2.symbol;
            el.receiveStep.innerHTML = stepProgressHtml(3, RECEIVE_STEP_LABELS);
            el.receiveBody.innerHTML =
              '<p class="recv-meta" style="text-align:left;margin-bottom:12px;color:var(--muted)">链 ' +
              r.chain +
              " 上有多个地址，请选择收款账户。</p>" +
              '<div class="option-list">' +
              list2
                .map(function (a) {
                  return (
                    '<button type="button" class="option-btn" data-pick-acc="' +
                    a.account +
                    '">' +
                    "<span><div>" +
                    a.account +
                    "</div>" +
                    '<div class="option-sub">' +
                    a.address +
                    "</div></span>" +
                    '<span style="color:var(--muted2)">›</span>' +
                    "</button>"
                  );
                })
                .join("") +
              "</div>";
            el.receiveBody.querySelectorAll("[data-pick-acc]").forEach(function (btn) {
              btn.addEventListener("click", function () {
                r.account = btn.dataset.pickAcc;
                r.step = "qr";
                renderReceive();
              });
            });
          } else if (r.step === "qr") {
            var tid3 = r.tokenId;
            var t3 = TOKENS[tid3];
            el.receiveTitle.textContent = "收款";
            el.receiveStep.innerHTML = stepProgressHtml(4, RECEIVE_STEP_LABELS);

            el.receiveBody.innerHTML =
              '<div class="qr-screen">' +
              '<p class="recv-meta">' +
              t3.symbol +
              " · " +
              r.chain +
              (r.account ? " · " + r.account : "") +
              "</p>" +
              '<div class="qr-placeholder" aria-hidden="true">' +
              buildQrSvg() +
              "</div>" +
              '<div class="recv-address-full">' +
              FULL_ADDRESS +
              "</div>" +
              '<p class="copy-hint">演示原型：地址与二维码为占位，真实环境由后端生成。</p>' +
              '<button type="button" class="btn btn-secondary" id="recv-done" style="margin-top:16px;width:100%">完成</button>' +
              "</div>";
            document.getElementById("recv-done").onclick = function () {
              if (state.receive.entry === "token") {
                openDetail(state.tokenId);
              } else {
                openHome();
              }
            };
          }

          document.getElementById("btn-back-receive").onclick = function () {
            if (r.step === "token") {
              openHome();
            } else if (r.step === "chain") {
              if (r.entry === "token") {
                openDetail(r.tokenId);
              } else {
                r.step = "token";
                r.tokenId = null;
                renderReceive();
              }
            } else if (r.step === "address") {
              r.step = "chain";
              r.account = null;
              renderReceive();
            } else if (r.step === "qr") {
              var list3 = getReceiveAddresses(r.tokenId, r.chain);
              if (list3.length > 1) {
                r.step = "address";
                r.account = null;
              } else {
                r.step = "chain";
                r.account = null;
              }
              renderReceive();
            }
          };
        }

        var SEND_STEP_LABELS = ["代币", "公链", "地址"];

        function renderSend() {
          var s = state.send;

          if (s.step === "token") {
            el.sendTitle.textContent = "转账";
            el.sendStep.innerHTML = stepProgressHtml(1, SEND_STEP_LABELS);
            el.sendBody.innerHTML =
              '<div class="option-list">' +
              Object.keys(TOKENS)
                .map(function (k) {
                  return pickTokenOptionHtml(TOKENS[k], "data-send-pick-token", TOKENS[k].id);
                })
                .join("") +
              "</div>";
            el.sendBody.querySelectorAll("[data-send-pick-token]").forEach(function (btn) {
              btn.addEventListener("click", function () {
                s.tokenId = btn.dataset.sendPickToken;
                var chains = getChainsWithBalance(s.tokenId);
                if (chains.length === 0) {
                  alert("原型：该代币当前无可转出余额。");
                  return;
                }
                s.step = "chain";
                renderSend();
              });
            });
          } else if (s.step === "chain") {
            var tid = s.tokenId;
            var t = TOKENS[tid];
            var chains = getChainsWithBalance(tid);
            el.sendTitle.textContent = "转账 · " + t.symbol;
            el.sendStep.innerHTML = stepProgressHtml(2, SEND_STEP_LABELS);
            if (chains.length === 0) {
              el.sendBody.innerHTML =
                '<p class="recv-meta">该代币暂无可转出余额。</p>' +
                '<button type="button" class="btn btn-secondary" id="send-empty-back" style="margin-top:16px;width:100%">返回</button>';
              document.getElementById("send-empty-back").onclick = function () {
                if (s.entry === "token") {
                  openDetail(s.tokenId);
                } else {
                  s.step = "token";
                  s.tokenId = null;
                  renderSend();
                }
              };
            } else {
              el.sendBody.innerHTML =
                '<div class="option-list">' +
                chains
                  .map(function (c) {
                    return pickChainOptionHtml(c, "data-send-pick-chain", c);
                  })
                  .join("") +
                "</div>";
              el.sendBody.querySelectorAll("[data-send-pick-chain]").forEach(function (btn) {
                btn.addEventListener("click", function () {
                  s.chain = btn.dataset.sendPickChain;
                  var list = getReceiveAddresses(s.tokenId, s.chain);
                  if (list.length > 1) {
                    s.step = "address";
                  } else {
                    s.account = list[0] ? list[0].account : "Main";
                    s.step = "form";
                  }
                  renderSend();
                });
              });
            }
          } else if (s.step === "address") {
            var tid2 = s.tokenId;
            var t2 = TOKENS[tid2];
            var list2 = getReceiveAddresses(tid2, s.chain);
            el.sendTitle.textContent = "转账 · " + t2.symbol;
            el.sendStep.innerHTML = stepProgressHtml(3, SEND_STEP_LABELS);
            el.sendBody.innerHTML =
              '<p class="recv-meta" style="text-align:left;margin-bottom:12px;color:var(--muted)">链 ' +
              s.chain +
              " 上有多个资金来源，请选择转出账户。以下为该地址在<strong>当前代币</strong>下的可用余额（本链）。</p>" +
              '<div class="option-list">' +
              list2
                .map(function (a) {
                  return (
                    '<button type="button" class="option-btn option-btn-send-addr" data-send-pick-acc="' +
                    a.account +
                    '">' +
                    '<span class="option-send-addr-main">' +
                    '<span class="option-send-addr-top">' +
                    '<span class="option-send-acc">' +
                    a.account +
                    "</span>" +
                    '<span class="option-send-balance"><span class="option-send-balance-label">余额</span>' +
                    a.balance +
                    " " +
                    t2.symbol +
                    "</span>" +
                    "</span>" +
                    '<div class="option-sub">' +
                    a.address +
                    "</div>" +
                    "</span>" +
                    '<span class="option-chevron" aria-hidden="true">›</span>' +
                    "</button>"
                  );
                })
                .join("") +
              "</div>";
            el.sendBody.querySelectorAll("[data-send-pick-acc]").forEach(function (btn) {
              btn.addEventListener("click", function () {
                s.account = btn.dataset.sendPickAcc;
                s.step = "form";
                renderSend();
              });
            });
          } else if (s.step === "form") {
            var tid3 = s.tokenId;
            var t3 = TOKENS[tid3];
            var row = findAddressRow(tid3, s.chain, s.account);
            var addrDisp = row ? row.address : "—";
            el.sendTitle.textContent = "转账";
            el.sendStep.innerHTML = "";
            el.sendBody.innerHTML =
              '<div class="send-form-screen">' +
              '<p class="recv-meta">' +
              t3.symbol +
              " · " +
              s.chain +
              (s.account ? " · " + s.account : "") +
              "</p>" +
              '<p class="recv-meta" style="font-size:0.78rem">资金来源（已选定）<br/><span style="font-family:ui-monospace">' +
              addrDisp +
              "</span></p>" +
              '<label class="send-form-label">收款地址</label>' +
              '<input type="text" class="send-input" readonly value="" placeholder="0x…（演示未填写）" />' +
              '<label class="send-form-label">金额</label>' +
              '<input type="text" class="send-input" readonly value="" placeholder="0.00 ' +
              t3.symbol +
              '" />' +
              '<button type="button" class="btn btn-primary" id="send-done" style="margin-top:18px;width:100%">确认转账（原型）</button>' +
              '<p class="copy-hint">演示：完成代币 → 网络 → 转出地址后进入表单；真实环境再输入收款方、金额并签名。</p>' +
              "</div>";
            document.getElementById("send-done").onclick = function () {
              alert("原型：此处将提交链上交易。");
              if (state.send.entry === "token") {
                openDetail(state.tokenId);
              } else {
                openHome();
              }
            };
          }

          document.getElementById("btn-back-send").onclick = function () {
            if (s.step === "token") {
              openHome();
            } else if (s.step === "chain") {
              if (s.entry === "token") {
                openDetail(s.tokenId);
              } else {
                s.step = "token";
                s.tokenId = null;
                renderSend();
              }
            } else if (s.step === "address") {
              s.step = "chain";
              s.account = null;
              renderSend();
            } else if (s.step === "form") {
              var list3 = getReceiveAddresses(s.tokenId, s.chain);
              if (list3.length > 1) {
                s.step = "address";
                s.account = null;
              } else {
                s.step = "chain";
                s.account = null;
              }
              renderSend();
            }
          };
        }

        function init() {
          document.getElementById("btn-receive-home").addEventListener("click", openReceiveFromHome);
          document.getElementById("btn-send-home").addEventListener("click", openSendFromHome);

          document.getElementById("btn-tx-home").addEventListener("click", openTxHome);

          document.getElementById("btn-back-tx-home").addEventListener("click", openHome);

          document.getElementById("btn-back-tx-addr").addEventListener("click", function () {
            if (state.tokenId) openDetail(state.tokenId);
          });

          el.chainList.addEventListener("click", function (e) {
            var addrBtn = e.target.closest(".addr-row-btn");
            if (!addrBtn) return;
            openTxAddressScreen(addrBtn.dataset.token, addrBtn.dataset.chain, addrBtn.dataset.account);
          });

          el.phToggle.addEventListener("click", function () {
            el.phBlock.classList.toggle("is-open");
          });

          renderHome();

          el.tokenList.addEventListener("click", function (e) {
            var row = e.target.closest("[data-token]");
            if (row) openDetail(row.dataset.token);
          });

          var phList = document.getElementById("ph-list");
          phList.innerHTML = PREVIOUSLY_HELD.map(function (p) {
            return (
              '<div class="ph-token">' +
              p.symbol +
              " · " +
              p.name +
              '<br/><span style="font-size:0.78rem">' +
              p.hint +
              "</span></div>"
            );
          }).join("");
        }

        init();
      })();
    </script>
  </body>
</html>
